<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Babys Consentidos</title>
    <link rel="icon" href="images/logo_babysconsentidos.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="hero">
        <img src="images/logo_babysconsentidos.ico" alt="logo de Babys Consentidos" class="logo">
        <div class="hero-content">
            <h1>Catálogo Babys Consentidos</h1>
        </div>
    </header>

    <main>
        <section class="catalog-section">
            <div class="catalog-header">
                <div id="sectionTabs" class="section-tabs"></div>
                <div class="section-info">
                    <h2 id="section-title"></h2>
                    <p id="section-description"></p>
                    <span id="section-price" class="section-price"></span>
                </div>
            </div>
            <div id="catalogo" class="catalog-grid"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Catálogo Babys Consentidos. Todos los derechos reservados.</p>
        <div class="social-links" aria-label="Redes sociales">
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
            <a href="#" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
        </div>
    </footer>

    <div id="imageModal" class="image-modal" aria-hidden="true">
        <button type="button" id="modalClose" class="modal-close" aria-label="Cerrar imagen">×</button>
        <img id="modalImage" class="modal-image" src="" alt="Imagen completa del producto">
    </div>

    <button type="button" id="waFab" class="wa-fab" aria-expanded="false" aria-controls="waPanel" aria-label="Abrir asesores de WhatsApp">
        <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
    </button>

    <div id="waOverlay" class="wa-overlay" aria-hidden="true"></div>

    <div id="waPanel" class="wa-panel" aria-hidden="true">
        <a href="https://wa.me/0000000000" class="wa-contact" target="_blank" rel="noopener noreferrer" title="Asesor 1" aria-label="Asesor 1">
            <i class="fa-solid fa-user-tie" aria-hidden="true"></i>
            <span class="wa-contact-label">Asesor 1</span>
        </a>
        <a href="https://wa.me/0000000000" class="wa-contact" target="_blank" rel="noopener noreferrer" title="Asesor 2" aria-label="Asesor 2">
            <i class="fa-solid fa-user-tie" aria-hidden="true"></i>
            <span class="wa-contact-label">Asesor 2</span>
        </a>
        <a href="https://wa.me/0000000000" class="wa-contact" target="_blank" rel="noopener noreferrer" title="Asesor 3" aria-label="Asesor 3">
            <i class="fa-solid fa-user-tie" aria-hidden="true"></i>
            <span class="wa-contact-label">Asesor 3</span>
        </a>
    </div>

    <script type="module" src="src/index.js"></script>
</body>
</html>
